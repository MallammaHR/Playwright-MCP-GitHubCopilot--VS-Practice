name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Optional: choose environment to run up to (DEV, QA, STAGE, PRODUCTION)'
        required: false
        default: ''

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

  deploy-dev:
    name: Deploy to DEV
    needs: test
    runs-on: ubuntu-latest
    environment: DEV
    if: ${{ needs.test.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Deploy placeholder to DEV
        run: |
          echo "Deploying to DEV environment..."
          ls -la playwright-report || true

  deploy-qa:
    name: Deploy to QA
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: QA
    if: ${{ needs.deploy-dev.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Deploy placeholder to QA
        run: |
          echo "Deploying to QA environment..."
          ls -la playwright-report || true

  deploy-stage:
    name: Deploy to STAGE
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: STAGE
    if: ${{ needs.deploy-qa.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Deploy placeholder to STAGE
        run: |
          echo "Deploying to STAGE environment..."
          ls -la playwright-report || true

  deploy-prod:
    name: Deploy to PRODUCTION
    needs: deploy-stage
    runs-on: ubuntu-latest
    environment: PRODUCTION
    if: ${{ needs.deploy-stage.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report

      - name: Deploy placeholder to PRODUCTION
        run: |
          echo "Deploying to PRODUCTION environment..."
          ls -la playwright-report || true
